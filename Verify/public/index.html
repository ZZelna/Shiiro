<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vérification</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="card">

    <div class="logo">
        🔒
    </div>

    <h1>Verification Required</h1>

    <p>
        Complete the verification below to access the Discord server.
    </p>

    <div class="progress">

        <div class="step active">
            <span>1</span>
            <p>Discord</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <span>2</span>
            <p>Captcha</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <span>3</span>
            <p>Verified</p>
        </div>

    </div>

    <form action="/login" method="GET">

        <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAADxb9oo1gMaOOvrj">
        </div>

        <br>

        <button type="submit" class="discord-btn">

            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24">
                <path d="M20.317 4.369A19.791 19.791 0 0 0 15.369 3l-.214.43a18.27 18.27 0 0 1 4.374 1.675 16.65 16.65 0 0 0-5.317-1.662 17.436 17.436 0 0 0-4.425.03A16.639 16.639 0 0 0 4.47 5.105a18.253 18.253 0 0 1 4.374-1.675L8.631 3a19.736 19.736 0 0 0-4.948 1.369C.533 9.106-.32 13.729.099 18.286A19.9 19.9 0 0 0 6.147 21c.49-.665.926-1.371 1.301-2.109a12.933 12.933 0 0 1-2.048-.98c.173-.128.343-.261.506-.399a13.94 13.94 0 0 0 12.188 0c.164.138.333.271.506.399a12.896 12.896 0 0 1-2.052.982A14.88 14.88 0 0 0 17.853 21a19.86 19.86 0 0 0 6.048-2.714c.5-5.274-.838-9.854-3.584-13.917ZM8.02 15.331c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.418 2.157-2.418 1.211 0 2.175 1.094 2.157 2.418 0 1.334-.955 2.419-2.157 2.419Zm7.96 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.418 2.157-2.418 1.211 0 2.175 1.094 2.157 2.418 0 1.334-.946 2.419-2.157 2.419Z"/>
            </svg>

            Se connecter avec Discord

        </button>

    </form>

</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="script.js"></script>

</body>
</html>
